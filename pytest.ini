[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Don't add pythonpath = . - it causes pytest to import the main package
# which has ComfyUI dependencies. Tests use conftest.py mocks instead.
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ImportWarning
